<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض النهارده | طلباتك هنا</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      font-family:Tahoma,Arial,sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at top right,rgba(255,159,10,.22),transparent 30%),
        linear-gradient(145deg,#080808,#171717);
    }
    .card{
      width:min(520px,100%);
      overflow:hidden;
      border-radius:30px;
      background:#151515;
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 25px 70px rgba(0,0,0,.55);
    }
    .top{
      padding:35px 24px 28px;
      text-align:center;
      background:linear-gradient(135deg,#ffbf3f,#ff8a00);
      color:#151515;
    }
    .logo{
      display:inline-block;
      padding:8px 18px;
      border-radius:999px;
      background:#151515;
      color:#ffb326;
      font-weight:900;
      margin-bottom:16px;
    }
    h1{font-size:2.15rem;line-height:1.3;margin:0}
    #customerName{display:block;font-size:2.65rem}
    .welcome{font-size:1.25rem;font-weight:900;margin:10px 0 0}
    .content{padding:28px 22px}
    .offer-title{text-align:center;font-size:1.7rem;margin:0 0 18px;color:#ffb326}
    .items{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .item{
      padding:15px 10px;
      border-radius:16px;
      text-align:center;
      background:#222;
      border:1px solid rgba(255,255,255,.07);
      font-weight:800;
    }
    .price{
      margin:20px 0;
      padding:18px;
      border-radius:20px;
      text-align:center;
      background:#ff9f0a;
      color:#111;
      font-size:1.3rem;
      font-weight:900;
    }
    .price strong{display:block;font-size:2.6rem;line-height:1.1}
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      border-radius:16px;
      text-decoration:none;
      background:#22c55e;
      color:#fff;
      font-weight:900;
      font-size:1.1rem;
    }
    .note{text-align:center;color:#aaa;font-size:.86rem;margin:14px 0 0}
    @media(max-width:430px){
      .items{grid-template-columns:1fr}
      h1{font-size:1.75rem}
      #customerName{font-size:2.25rem}
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="top">
      <div class="logo">طلباتك هنا</div>
      <h1>أهلاً يا <span id="customerName">يا غالي</span></h1>
      <p class="welcome">نورتنا يا غالي ❤️</p>
    </section>

    <section class="content">
      <h2 class="offer-title">🔥 عرض النهارده</h2>

      <div class="items">
        <div class="item">🍗 ربع فرخة</div>
        <div class="item">🥙 2 حواوشي</div>
        <div class="item">🍢 ربع كفتة</div>
        <div class="item">🫓 عيش وطحينة وكاتشب</div>
      </div>

      <div class="price">
        كل ده بـ
        <strong>155 جنيه</strong>
        بس
      </div>

      <a id="orderBtn" class="btn" href="#" target="_blank">💬 اطلب العرض على واتساب</a>
      <p class="note">العرض متاح حسب الكمية المتوفرة</p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawName = (params.get("name") || "يا غالي").trim();
    const safeName = rawName.substring(0, 30);

    document.getElementById("customerName").textContent = safeName;

    const message =
      "السلام عليكم، أنا " + safeName +
      " وعاوز أطلب عرض النهارده: ربع فرخة + 2 حواوشي + ربع كفتة + عيش وطحينة وكاتشب بـ 155 جنيه";

    document.getElementById("orderBtn").href =
      "https://wa.me/201030085653?text=" + encodeURIComponent(message);
  </script>
</body>
</html>
